<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30分タイマー</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #fff;
            color: #111;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        .time {
            font-size: 96px;
            font-weight: 200;
            letter-spacing: -0.03em;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            transition: color 0.3s;
        }

        .time.danger {
            color: #d00;
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        button {
            background: none;
            border: 1px solid #ccc;
            color: #111;
            font-size: 15px;
            padding: 10px 28px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        button:hover {
            background: #f4f4f4;
            border-color: #aaa;
        }

        button:active {
            background: #e8e8e8;
        }

        #startBtn {
            background: #111;
            color: #fff;
            border-color: #111;
            min-width: 110px;
        }

        #startBtn:hover {
            background: #333;
            border-color: #333;
        }

        #startBtn:disabled {
            background: #ccc;
            border-color: #ccc;
            cursor: default;
        }

        .bar-wrap {
            width: 280px;
            height: 2px;
            background: #eee;
            border-radius: 1px;
        }

        .bar {
            height: 100%;
            background: #111;
            border-radius: 1px;
            width: 100%;
            transition: width 1s linear, background 0.3s;
        }

        .bar.danger {
            background: #d00;
        }
    </style>
</head>

<body>

    <div class="time" id="time">30:00</div>

    <div class="bar-wrap">
        <div class="bar" id="bar"></div>
    </div>

    <div class="controls">
        <button id="resetBtn">リセット</button>
        <button id="startBtn">スタート</button>
    </div>

    <script>
        const TOTAL = 30 * 60;
        let remaining = TOTAL;
        let running = false;
        let timer = null;

        const timeEl = document.getElementById('time');
        const barEl = document.getElementById('bar');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');

        function fmt(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        function render() {
            const danger = remaining <= 60;
            timeEl.textContent = fmt(remaining);
            timeEl.classList.toggle('danger', danger);
            barEl.style.width = (remaining / TOTAL * 100) + '%';
            barEl.classList.toggle('danger', danger);
        }

        function start() {
            running = true;
            startBtn.textContent = '一時停止';
            timer = setInterval(() => {
                remaining--;
                render();
                if (remaining <= 0) {
                    clearInterval(timer);
                    running = false;
                    startBtn.disabled = true;
                    startBtn.textContent = 'スタート';
                }
            }, 1000);
        }

        function pause() {
            running = false;
            clearInterval(timer);
            startBtn.textContent = '再開';
        }

        function reset() {
            clearInterval(timer);
            running = false;
            remaining = TOTAL;
            startBtn.disabled = false;
            startBtn.textContent = 'スタート';
            render();
        }

        startBtn.addEventListener('click', () => running ? pause() : start());
        resetBtn.addEventListener('click', reset);

        document.addEventListener('keydown', e => {
            if (e.code === 'Space') { e.preventDefault(); startBtn.click(); }
            if (e.code === 'KeyR') reset();
        });

        render();
    </script>
</body>

</html>
