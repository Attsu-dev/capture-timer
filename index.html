<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>脱出ゲーム 進行管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 16px;
    }

    /* ===== ローディング・設定画面 ===== */
    #setup-screen {
      max-width: 480px;
      margin: 80px auto;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 32px;
    }
    #setup-screen h1 {
      font-size: 1.4rem;
      margin-bottom: 24px;
      color: #fff;
    }
    #setup-screen label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 6px;
    }
    #setup-screen input {
      width: 100%;
      padding: 10px 12px;
      background: #111;
      border: 1px solid #444;
      border-radius: 4px;
      color: #f0f0f0;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }
    #setup-screen input:focus {
      outline: none;
      border-color: #4af;
    }
    #setup-screen .hint {
      font-size: 0.75rem;
      color: #666;
      margin-top: -12px;
      margin-bottom: 16px;
    }
    #load-btn {
      width: 100%;
      padding: 12px;
      background: #4af;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    #load-btn:hover { background: #6cf; }
    #load-error {
      margin-top: 12px;
      color: #f66;
      font-size: 0.85rem;
    }

    /* ===== メイン画面 ===== */
    #main-screen { display: none; }

    /* タイマーエリア */
    #timer-area {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 16px;
    }
    #timer {
      font-size: 3rem;
      font-variant-numeric: tabular-nums;
      font-weight: bold;
      letter-spacing: 2px;
      color: #fff;
    }
    #timer.warning { color: #f80; }
    #timer.danger  { color: #f44; }
    #diff {
      font-size: 1.2rem;
      font-variant-numeric: tabular-nums;
    }
    #diff.positive { color: #4f8; } /* 余裕あり（早い） */
    #diff.negative { color: #f66; } /* 遅れ */

    /* タイマーボタン */
    #timer-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .ctrl-btn {
      padding: 8px 16px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #1a1a1a;
      color: #ccc;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .ctrl-btn:hover { background: #2a2a2a; }
    .ctrl-btn.active { background: #444; color: #fff; }

    /* シーン情報 */
    #scene-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    #scene-name {
      font-size: 1.1rem;
      font-weight: bold;
      color: #ccc;
    }
    #scene-step {
      font-size: 0.85rem;
      color: #666;
    }

    /* ステップ表示 */
    #step-display {
      font-size: 1.3rem;
      font-weight: bold;
      color: #4af;
      margin-bottom: 16px;
    }

    /* 台本エリア */
    #script-area {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 20px;
      font-size: 1.05rem;
      line-height: 1.9;
      white-space: pre-wrap;
      min-height: 240px;
      margin-bottom: 20px;
      color: #e0e0e0;
    }

    /* ナビボタン */
    #nav-buttons {
      display: flex;
      gap: 10px;
    }
    .nav-btn {
      flex: 1;
      padding: 14px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #1a1a1a;
      color: #ccc;
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
    }
    .nav-btn:hover:not(:disabled) { background: #2a2a2a; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    #btn-next {
      background: #222;
      color: #4af;
      border-color: #4af;
      font-weight: bold;
    }
    #btn-next:hover:not(:disabled) { background: #1a2a3a; }

    /* リセットリンク */
    #reset-link {
      display: block;
      text-align: right;
      margin-top: 16px;
      font-size: 0.75rem;
      color: #555;
      cursor: pointer;
      text-decoration: underline;
    }
    #reset-link:hover { color: #888; }

    /* レスポンシブ */
    @media (max-width: 480px) {
      #timer { font-size: 2.2rem; }
      #diff  { font-size: 1rem; }
      #script-area { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<!-- 設定画面 -->
<div id="setup-screen">
  <h1>📋 スプレッドシートを読み込む</h1>
  <label>Google スプレッドシートの共有URL（または スプレッドシートID）</label>
  <input type="text" id="sheet-url" placeholder="https://docs.google.com/spreadsheets/d/..." />
  <p class="hint">※ スプレッドシートを「リンクを知っている全員」に公開してください</p>
  <label>シート名（タブ名）</label>
  <input type="text" id="sheet-name" value="シート1" />
  <button id="load-btn" onclick="loadSheet()">読み込む</button>
  <p id="load-error"></p>
</div>

<!-- メイン画面 -->
<div id="main-screen">
  <div id="timer-area">
    <div id="timer">30:00</div>
    <div id="diff">--:--</div>
  </div>
  <div id="timer-controls">
    <button class="ctrl-btn" id="btn-start" onclick="startTimer()">▶ 開始</button>
    <button class="ctrl-btn" id="btn-pause" onclick="pauseTimer()">⏸ 一時停止</button>
    <button class="ctrl-btn" onclick="resetTimer()">↺ リセット</button>
  </div>

  <div id="scene-info">
    <div id="scene-name">—</div>
    <div id="scene-step">—</div>
  </div>
  <div id="step-display">—</div>
  <div id="script-area">台本がここに表示されます</div>

  <div id="nav-buttons">
    <button class="nav-btn" id="btn-prev" onclick="moveStep(-1)">◀ 前のシーン</button>
    <button class="nav-btn" id="btn-next" onclick="moveStep(1)">次のシーン ▶</button>
  </div>

  <span id="reset-link" onclick="resetApp()">別のスプレッドシートを読み込む</span>
</div>

<script>
// ===== データ =====
let scenes = [];         // [{name, clearTime, steps: [{label, script}]}]
let currentScene = 0;
let currentStep  = 0;

// ===== タイマー =====
const TOTAL_SEC = 30 * 60; // 30分
let remaining = TOTAL_SEC;
let timerRunning = false;
let timerInterval = null;
let sceneStartRemaining = TOTAL_SEC; // シーン開始時の残り秒数

// ===== スプレッドシート読み込み =====
function extractSheetId(input) {
  const m = input.match(/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : input.trim();
}

async function loadSheet() {
  const url     = document.getElementById('sheet-url').value;
  const shName  = document.getElementById('sheet-name').value || 'シート1';
  const errEl   = document.getElementById('load-error');
  errEl.textContent = '読み込み中...';

  const id = extractSheetId(url);
  if (!id) { errEl.textContent = 'URLまたはIDを入力してください'; return; }

  // Google Sheets CSV export URL
  const csvUrl = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(shName)}`;

  try {
    const res = await fetch(csvUrl);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    parseCSV(text);
    errEl.textContent = '';
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('main-screen').style.display  = 'block';
    renderStep();
  } catch (e) {
    errEl.textContent = `エラー: ${e.message}。スプレッドシートが公開されているか確認してください。`;
  }
}

// ===== CSV パース =====
// 期待するフォーマット（1行目はヘッダー）:
// シーン名 | 想定クリアタイム(mm:ss) | ステップ名 | 台本
// 同じシーン名が続く行は同じシーンに属する
function parseCSV(text) {
  const rows = csvToArray(text);
  if (rows.length < 2) { alert('データが空です'); return; }

  scenes = [];
  let lastSceneName = null;

  for (let i = 1; i < rows.length; i++) {  // 1行目はヘッダー
    const [sceneName, clearTime, stepLabel, script] = rows[i];
    if (!sceneName && !stepLabel) continue;

    // 新しいシーン
    if (sceneName && sceneName !== lastSceneName) {
      scenes.push({ name: sceneName, clearTime: parseTime(clearTime), steps: [] });
      lastSceneName = sceneName;
    }
    if (stepLabel !== undefined) {
      scenes[scenes.length - 1].steps.push({
        label:  stepLabel || '',
        script: script   || ''
      });
    }
  }
  currentScene = 0;
  currentStep  = 0;
  sceneStartRemaining = remaining;
}

function parseTime(str) {
  // "mm:ss" → 秒数
  if (!str) return 0;
  const parts = str.trim().split(':');
  if (parts.length === 2) return parseInt(parts[0]) * 60 + parseInt(parts[1]);
  return parseInt(str) || 0;
}

// シンプルなCSVパーサー（ダブルクォート対応）
function csvToArray(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    rows.push(parseCsvLine(line));
  }
  return rows;
}
function parseCsvLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur);
  return result;
}

// ===== タイマー =====
function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  timerInterval = setInterval(() => {
    remaining--;
    if (remaining <= 0) { remaining = 0; clearInterval(timerInterval); timerRunning = false; }
    updateTimerDisplay();
  }, 1000);
}
function pauseTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
}
function resetTimer() {
  pauseTimer();
  remaining = TOTAL_SEC;
  sceneStartRemaining = TOTAL_SEC;
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const timerEl = document.getElementById('timer');
  const diffEl  = document.getElementById('diff');

  timerEl.textContent = formatTime(remaining);
  timerEl.className = remaining <= 60 ? 'danger' : remaining <= 300 ? 'warning' : '';

  // 差分 = 現在残り時間 - (シーン開始残り時間 - 想定クリアタイム)
  const scene = scenes[currentScene];
  if (scene && scene.clearTime > 0) {
    const expectedRemaining = sceneStartRemaining - scene.clearTime;
    const diff = remaining - expectedRemaining;
    const sign = diff >= 0 ? '+' : '-';
    diffEl.textContent = sign + formatTime(Math.abs(diff));
    diffEl.className = diff >= 0 ? 'positive' : 'negative';
  } else {
    diffEl.textContent = '';
  }
}

function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = (sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

// ===== シーン・ステップ表示 =====
function moveStep(dir) {
  if (scenes.length === 0) return;
  const scene = scenes[currentScene];
  const newStep = currentStep + dir;

  if (newStep < 0) {
    // 前のシーンへ
    if (currentScene > 0) {
      currentScene--;
      sceneStartRemaining = remaining;
      currentStep = scenes[currentScene].steps.length - 1;
    }
  } else if (newStep >= scene.steps.length) {
    // 次のシーンへ
    if (currentScene < scenes.length - 1) {
      currentScene++;
      sceneStartRemaining = remaining;
      currentStep = 0;
    }
  } else {
    currentStep = newStep;
  }
  renderStep();
}

function renderStep() {
  if (scenes.length === 0) return;
  const scene = scenes[currentScene];
  const step  = scene.steps[currentStep] || { label: '—', script: '—' };
  const totalSteps = scene.steps.length;

  document.getElementById('scene-name').textContent  = scene.name;
  document.getElementById('scene-step').textContent  = `ステップ ${currentStep + 1} / ${totalSteps}`;
  document.getElementById('step-display').textContent = step.label;
  document.getElementById('script-area').textContent  = step.script;

  document.getElementById('btn-prev').disabled =
    currentScene === 0 && currentStep === 0;
  document.getElementById('btn-next').disabled =
    currentScene === scenes.length - 1 && currentStep === scenes[currentScene].steps.length - 1;

  updateTimerDisplay();
}

// ===== アプリリセット =====
function resetApp() {
  pauseTimer();
  remaining = TOTAL_SEC;
  scenes = [];
  document.getElementById('main-screen').style.display  = 'none';
  document.getElementById('setup-screen').style.display = 'block';
  document.getElementById('load-error').textContent = '';
}
</script>
</body>
</html>
