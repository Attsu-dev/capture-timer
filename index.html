<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30分タイマー</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Shippori+Mincho:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0e0e10;
            --surface: #18181c;
            --border: #2a2a32;
            --accent: #e8d5a3;
            --accent-dim: #a89060;
            --danger: #e05555;
            --text: #f0ece0;
            --muted: #5a5a6a;
            --ring-track: #1e1e24;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            overflow: hidden;
            position: relative;
        }

        /* Grain texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
            opacity: 0.6;
        }

        /* Subtle radial glow */
        body::after {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(232, 213, 163, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 48px;
        }

        .label {
            font-family: 'Shippori Mincho', serif;
            font-size: 13px;
            letter-spacing: 0.35em;
            color: var(--muted);
            text-transform: uppercase;
        }

        /* SVG Ring */
        .ring-wrap {
            position: relative;
            width: 280px;
            height: 280px;
        }

        .ring-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .ring-track {
            fill: none;
            stroke: var(--ring-track);
            stroke-width: 3;
        }

        .ring-progress {
            fill: none;
            stroke: var(--accent);
            stroke-width: 3;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear, stroke 0.4s ease;
        }

        .ring-progress.danger {
            stroke: var(--danger);
        }

        /* Tick marks */
        .tick {
            stroke: var(--muted);
            stroke-width: 1;
            opacity: 0.4;
        }

        /* Center display */
        .center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .time-display {
            font-family: 'DM Mono', monospace;
            font-size: 56px;
            font-weight: 300;
            letter-spacing: -0.02em;
            color: var(--text);
            line-height: 1;
            transition: color 0.4s ease;
        }

        .time-display.danger {
            color: var(--danger);
        }

        .time-sub {
            font-size: 11px;
            letter-spacing: 0.2em;
            color: var(--muted);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.12em;
            padding: 10px 28px;
            border-radius: 2px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .btn:hover::before {
            opacity: 0.06;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            border-color: var(--accent-dim);
            color: var(--accent);
            min-width: 120px;
        }

        .btn-primary:hover {
            border-color: var(--accent);
            background: rgba(232, 213, 163, 0.05);
        }

        .btn-ghost {
            border-color: var(--border);
            color: var(--muted);
            font-size: 11px;
            padding: 10px 18px;
        }

        .btn-ghost:hover {
            color: var(--text);
            border-color: var(--muted);
        }

        /* Progress bar (bottom) */
        .progress-bar-wrap {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .progress-bar-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        .progress-bar {
            height: 2px;
            background: var(--ring-track);
            border-radius: 1px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 1px;
            transition: width 1s linear, background 0.4s ease;
        }

        .progress-fill.danger {
            background: var(--danger);
        }

        /* Pulse animation when running */
        @keyframes soft-pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .time-display.running {
            animation: soft-pulse 2s ease-in-out infinite;
        }

        /* Finish flash */
        @keyframes finish-flash {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }

        .finished .time-display {
            animation: finish-flash 0.8s ease-in-out infinite;
            color: var(--accent);
        }

        /* Sound indicator */
        .sound-btn {
            position: fixed;
            top: 24px;
            right: 24px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            cursor: pointer;
            font-size: 16px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            transition: all 0.2s;
            z-index: 10;
        }

        .sound-btn:hover {
            color: var(--text);
            border-color: var(--muted);
        }

        /* Status dot */
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            letter-spacing: 0.2em;
            color: var(--muted);
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--muted);
            transition: background 0.3s;
        }

        .dot.active {
            background: var(--accent);
            box-shadow: 0 0 6px rgba(232, 213, 163, 0.5);
            animation: soft-pulse 1.5s ease-in-out infinite;
        }

        .dot.danger {
            background: var(--danger);
            box-shadow: 0 0 6px rgba(224, 85, 85, 0.5);
        }
    </style>
</head>

<body>

    <button class="sound-btn" id="soundBtn" title="サウンド切替">🔔</button>

    <div class="container">
        <div class="label">30分タイマー</div>

        <div class="ring-wrap">
            <svg class="ring-svg" viewBox="0 0 280 280" id="ringSvg">
                <!-- Tick marks -->
                <g id="ticks"></g>
                <!-- Track -->
                <circle class="ring-track" cx="140" cy="140" r="128" />
                <!-- Progress -->
                <circle class="ring-progress" id="ringProgress" cx="140" cy="140" r="128" />
            </svg>

            <div class="center" id="centerDisplay">
                <div class="time-display" id="timeDisplay">30:00</div>
                <div class="time-sub" id="timeSub">残り時間</div>
            </div>
        </div>

        <div class="status">
            <div class="dot" id="statusDot"></div>
            <span id="statusText">待機中</span>
        </div>

        <div class="controls">
            <button class="btn btn-ghost" id="resetBtn">リセット</button>
            <button class="btn btn-primary" id="startBtn">スタート</button>
        </div>

        <div class="progress-bar-wrap">
            <div class="progress-bar-row">
                <span>0:00</span>
                <span>30:00</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width:100%"></div>
            </div>
        </div>
    </div>

    <script>
        const TOTAL = 30 * 60; // 1800 seconds
        let remaining = TOTAL;
        let running = false;
        let interval = null;
        let soundEnabled = true;
        let finished = false;

        const timeDisplay = document.getElementById('timeDisplay');
        const timeSub = document.getElementById('timeSub');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const ringProgress = document.getElementById('ringProgress');
        const progressFill = document.getElementById('progressFill');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const soundBtn = document.getElementById('soundBtn');
        const centerDisplay = document.getElementById('centerDisplay');

        // Ring circumference
        const R = 128;
        const CIRC = 2 * Math.PI * R;
        ringProgress.style.strokeDasharray = CIRC;
        ringProgress.style.strokeDashoffset = 0;

        // Draw tick marks
        const ticks = document.getElementById('ticks');
        for (let i = 0; i < 60; i++) {
            const angle = (i / 60) * 2 * Math.PI - Math.PI / 2;
            const isMajor = i % 5 === 0;
            const inner = isMajor ? 112 : 118;
            const outer = 128;
            const x1 = 140 + inner * Math.cos(angle);
            const y1 = 140 + inner * Math.sin(angle);
            const x2 = 140 + outer * Math.cos(angle);
            const y2 = 140 + outer * Math.sin(angle);
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1); line.setAttribute('y1', y1);
            line.setAttribute('x2', x2); line.setAttribute('y2', y2);
            line.setAttribute('class', 'tick');
            line.style.strokeWidth = isMajor ? '2' : '1';
            ticks.appendChild(line);
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        function updateUI() {
            const ratio = remaining / TOTAL;
            const isDanger = remaining <= 60 && remaining > 0;

            timeDisplay.textContent = formatTime(remaining);
            ringProgress.style.strokeDashoffset = CIRC * (1 - ratio);

            progressFill.style.width = (ratio * 100) + '%';

            // Danger state (last 1 min)
            ringProgress.classList.toggle('danger', isDanger);
            progressFill.classList.toggle('danger', isDanger);
            timeDisplay.classList.toggle('danger', isDanger && !finished);

            // Running animation
            timeDisplay.classList.toggle('running', running && !isDanger);
        }

        function setStatus(state) {
            if (state === 'running') {
                statusDot.className = 'dot active';
                statusText.textContent = '計測中';
            } else if (state === 'paused') {
                statusDot.className = 'dot';
                statusText.textContent = '一時停止';
            } else if (state === 'idle') {
                statusDot.className = 'dot';
                statusText.textContent = '待機中';
            } else if (state === 'done') {
                statusDot.className = 'dot danger';
                statusText.textContent = '完了！';
            }
        }

        function beep(type = 'tick') {
            if (!soundEnabled) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                if (type === 'finish') {
                    osc.frequency.setValueAtTime(880, ctx.currentTime);
                    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.15);
                    osc.frequency.setValueAtTime(880, ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.9);
                    osc.start(); osc.stop(ctx.currentTime + 0.9);
                } else {
                    osc.frequency.value = 660;
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                    osc.start(); osc.stop(ctx.currentTime + 0.15);
                }
            } catch (e) { }
        }

        function start() {
            if (finished) return;
            running = true;
            startBtn.textContent = '一時停止';
            setStatus('running');
            interval = setInterval(() => {
                remaining--;
                updateUI();
                if (remaining <= 0) {
                    clearInterval(interval);
                    running = false;
                    finished = true;
                    timeDisplay.textContent = '00:00';
                    timeSub.textContent = '終了！';
                    centerDisplay.classList.add('finished');
                    startBtn.textContent = 'スタート';
                    startBtn.disabled = true;
                    setStatus('done');
                    beep('finish');
                    // Repeat beep
                    setTimeout(() => beep('finish'), 1000);
                    setTimeout(() => beep('finish'), 2000);
                }
            }, 1000);
        }

        function pause() {
            running = false;
            clearInterval(interval);
            startBtn.textContent = '再開';
            setStatus('paused');
        }

        function reset() {
            clearInterval(interval);
            running = false;
            finished = false;
            remaining = TOTAL;
            startBtn.textContent = 'スタート';
            startBtn.disabled = false;
            timeSub.textContent = '残り時間';
            centerDisplay.classList.remove('finished');
            timeDisplay.classList.remove('danger', 'running');
            ringProgress.classList.remove('danger');
            progressFill.classList.remove('danger');
            setStatus('idle');
            updateUI();
        }

        startBtn.addEventListener('click', () => {
            if (finished) return;
            running ? pause() : start();
        });

        resetBtn.addEventListener('click', reset);

        soundBtn.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            soundBtn.textContent = soundEnabled ? '🔔' : '🔕';
            soundBtn.title = soundEnabled ? 'サウンド切替' : 'サウンドオフ';
        });

        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); startBtn.click(); }
            if (e.code === 'KeyR') reset();
        });

        updateUI();
    </script>
</body>

</html>
