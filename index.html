<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>謎解き公演タイマー</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;700&display=swap');

        :root {
            --bg: #0a0c10;
            --panel: #0f1318;
            --border: #1e2530;
            --accent: #00e5ff;
            --accent-dim: #007a99;
            --warn: #ff9100;
            --danger: #ff3c3c;
            --ok: #00e676;
            --text: #d0dce8;
            --text-dim: #4a5a6a;
            --mono: 'Share Tech Mono', monospace;
            --sans: 'Noto Sans JP', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            display: flex;
            flex-direction: column;
            height: 100dvh;
            background-image: radial-gradient(ellipse 100% 40% at 50% 0%, rgba(0, 229, 255, 0.05) 0%, transparent 70%);
        }

        /* ─── HEADER ─── */
        .header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: .15em;
            color: var(--accent-dim);
        }

        .danger-zone {
            display: flex;
            gap: 6px;
        }

        .btn-danger {
            font-family: var(--mono);
            font-size: 10px;
            padding: 5px 10px;
            border-radius: 3px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
        }

        .btn-danger.confirm-mode {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(255, 60, 60, .15);
            animation: pulse-danger .6s ease-in-out infinite alternate;
            font-size: 9px;
            padding: 5px 7px;
        }

        @keyframes pulse-danger {
            from {
                box-shadow: 0 0 0 0 rgba(255, 60, 60, 0);
            }

            to {
                box-shadow: 0 0 6px 2px rgba(255, 60, 60, .4);
            }
        }

        /* ─── MAIN ─── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px 12px;
            overflow: hidden;
            min-height: 0;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            position: relative;
            overflow: hidden;
        }

        .panel-label {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: .18em;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        /* ROW 1: タイマー + 問題番号 */
        .row-top {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .panel-timer {
            flex: 3;
            text-align: center;
        }

        .timer-display {
            font-family: var(--mono);
            font-size: clamp(44px, 13vw, 64px);
            line-height: 1;
            letter-spacing: .04em;
            color: var(--accent);
            text-shadow: 0 0 24px rgba(0, 229, 255, .5);
            transition: color .3s, text-shadow .3s;
        }

        .timer-display.warn {
            color: var(--warn);
            text-shadow: 0 0 24px rgba(255, 145, 0, .5);
        }

        .timer-display.danger {
            color: var(--danger);
            text-shadow: 0 0 24px rgba(255, 60, 60, .6);
            animation: blink .8s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: .35;
            }
        }

        .timer-bar-wrap {
            margin-top: 6px;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .timer-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width .5s linear, background .3s;
        }

        .timer-bar.warn {
            background: var(--warn);
        }

        .timer-bar.danger {
            background: var(--danger);
        }

        .panel-qnum {
            flex: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .qnum-display {
            font-family: var(--mono);
            font-size: clamp(36px, 10vw, 52px);
            line-height: 1;
            color: var(--text);
        }

        .qnum-display span {
            font-size: clamp(14px, 4vw, 20px);
            color: var(--text-dim);
            margin-left: 2px;
        }

        /* ROW 2: 答え + 誤差 */
        .row-mid {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .panel-answer {
            flex: 3;
        }

        .answer-text {
            font-family: var(--mono);
            font-size: clamp(26px, 7vw, 36px);
            letter-spacing: .08em;
            color: var(--ok);
            text-shadow: 0 0 16px rgba(0, 230, 118, .3);
            line-height: 1.2;
        }

        .panel-delta {
            flex: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .delta-sub {
            font-family: var(--mono);
            font-size: 9px;
            color: var(--text-dim);
            margin-bottom: 3px;
        }

        .delta-display {
            font-family: var(--mono);
            font-size: clamp(24px, 7vw, 34px);
            line-height: 1;
            letter-spacing: .04em;
            transition: color .3s;
        }

        .delta-display.ahead {
            color: var(--ok);
            text-shadow: 0 0 12px rgba(0, 230, 118, .4);
        }

        .delta-display.behind {
            color: var(--danger);
            text-shadow: 0 0 12px rgba(255, 60, 60, .4);
        }

        .delta-display.neutral {
            color: var(--text-dim);
        }

        /* ROW 3: コメント (flex grow) */
        .panel-comment {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
        }

        .comment-text {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text);
        }

        /* ROW 4: 次へボタン */
        .btn-next {
            flex-shrink: 0;
            width: 100%;
            font-family: var(--mono);
            font-size: 15px;
            letter-spacing: .18em;
            padding: 18px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            background: rgba(0, 229, 255, .07);
            color: var(--accent);
            cursor: pointer;
            transition: all .15s;
        }

        .btn-next:active {
            transform: scale(.97);
            background: rgba(0, 229, 255, .15);
        }

        .btn-next:disabled {
            border-color: var(--border);
            color: var(--text-dim);
            background: transparent;
        }

        /* CLEAR OVERLAY */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .88);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 14px;
        }

        .overlay.show {
            display: flex;
        }

        .overlay-title {
            font-family: var(--mono);
            font-size: 42px;
            color: var(--ok);
            text-shadow: 0 0 36px rgba(0, 230, 118, .6);
            letter-spacing: .12em;
        }

        .overlay-sub {
            font-family: var(--sans);
            font-size: 16px;
            color: var(--text-dim);
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🔍 謎解き公演 / STAFF</h1>
        <div class="danger-zone">
            <button class="btn-danger" id="btn-pause" onclick="handlePause()">⏸ 一時停止</button>
            <button class="btn-danger" id="btn-reset" onclick="handleReset()">↺ リセット</button>
        </div>
    </div>

    <div class="main">
        <div class="row-top">
            <div class="panel panel-timer">
                <div class="panel-label">残り時間</div>
                <div class="timer-display" id="timer-display">30:00</div>
                <div class="timer-bar-wrap">
                    <div class="timer-bar" id="timer-bar" style="width:100%"></div>
                </div>
            </div>
            <div class="panel panel-qnum">
                <div class="panel-label">問題</div>
                <div class="qnum-display" id="qnum-display">1<span>問目</span></div>
            </div>
        </div>

        <div class="row-mid">
            <div class="panel panel-answer">
                <div class="panel-label">答え</div>
                <div class="answer-text" id="answer-text">—</div>
            </div>
            <div class="panel panel-delta">
                <div class="panel-label">進行差</div>
                <div class="delta-sub" id="delta-target">想定 —</div>
                <div class="delta-display neutral" id="delta-display">—</div>
            </div>
        </div>

        <div class="panel panel-comment">
            <div class="panel-label">コメント</div>
            <div class="comment-text" id="comment-text">—</div>
        </div>

        <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題へ ▶</button>
    </div>

    <div class="overlay" id="overlay-clear">
        <div class="overlay-title">✓ CLEARED</div>
        <div class="overlay-sub">全問クリア！お疲れ様でした</div>
    </div>

    <script>
        const QUESTIONS = [
            { answer: 'あいうえお', comment: '最初の問題です。落ち着いて取り組みましょう。', clearMin: 1, clearSec: 0 },
            { answer: 'かきくけこ', comment: '文字を正しく並び替えてみましょう。', clearMin: 2, clearSec: 0 },
            { answer: 'さしすせそ', comment: '図の中に隠れたキーワードがあります。', clearMin: 3, clearSec: 0 },
            { answer: 'たちつてと', comment: '数字と記号の対応表を使ってください。', clearMin: 4, clearSec: 0 },
            { answer: 'なにぬねの', comment: '色に注目してください。', clearMin: 5, clearSec: 0 },
            { answer: 'はひふへほ', comment: '矢印の方向に進むと答えが見えてきます。', clearMin: 6, clearSec: 0 },
            { answer: 'まみむめも', comment: '2枚の紙を重ねると文字が浮かびます。', clearMin: 7, clearSec: 0 },
            { answer: 'やゆよ', comment: '音に変換してみましょう。', clearMin: 8, clearSec: 0 },
            { answer: 'らりるれろ', comment: '鏡に映したように読むと？', clearMin: 9, clearSec: 30 },
            { answer: 'わをん', comment: '全体の地図と照らし合わせてください。', clearMin: 11, clearSec: 0 },
            { answer: 'アイウエオ', comment: '今まで集めたピースをすべて使います。', clearMin: 12, clearSec: 30 },
            { answer: 'カキクケコ', comment: '暗号表のルールが変わっています。', clearMin: 14, clearSec: 0 },
            { answer: 'サシスセソ', comment: 'ここで大きなヒントが手に入ります。', clearMin: 15, clearSec: 0 },
            { answer: 'タチツテト', comment: '各問の答えの頭文字を集めてください。', clearMin: 16, clearSec: 0 },
            { answer: 'ナニヌネノ', comment: '最初の謎が伏線だったことに気づきましたか？', clearMin: 17, clearSec: 0 },
            { answer: 'ハヒフヘホ', comment: '残り時間を意識して進めましょう。', clearMin: 18, clearSec: 0 },
            { answer: 'マミムメモ', comment: 'スタッフに合言葉を伝えてください。', clearMin: 19, clearSec: 0 },
            { answer: 'ヤユヨ', comment: 'カードとカードを組み合わせます。', clearMin: 21, clearSec: 0 },
            { answer: 'ラリルレロ', comment: 'いよいよクライマックスです！', clearMin: 23, clearSec: 0 },
            { answer: 'ワヲン', comment: '最後の答えをスタッフに伝えてゴールです！', clearMin: 25, clearSec: 0 },
        ];

        const TOTAL_SEC = 30 * 60;
        let remaining = TOTAL_SEC, elapsed = 0, currentQ = 0;
        let paused = false, finished = false;
        let pauseConfirm = false, resetConfirm = false;
        let pauseTimer = null, resetTimer = null;

        function fmt(sec) {
            const m = Math.floor(Math.abs(sec) / 60);
            const s = Math.abs(sec) % 60;
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        setInterval(() => {
            if (paused || finished) return;
            remaining--; elapsed++;
            if (remaining <= 0) { remaining = 0; finished = true; }
            render();
        }, 1000);

        function render() {
            const q = QUESTIONS[currentQ];
            const td = document.getElementById('timer-display');
            const tb = document.getElementById('timer-bar');
            td.textContent = fmt(remaining);
            tb.style.width = (remaining / TOTAL_SEC * 100) + '%';
            td.className = 'timer-display' + (remaining <= 60 ? ' danger' : remaining <= 300 ? ' warn' : '');
            tb.className = 'timer-bar' + (remaining <= 60 ? ' danger' : remaining <= 300 ? ' warn' : '');

            document.getElementById('qnum-display').innerHTML = `${currentQ + 1}<span>問目</span>`;
            document.getElementById('answer-text').textContent = q.answer;
            document.getElementById('comment-text').textContent = q.comment;

            const target = q.clearMin * 60 + q.clearSec;
            const delta = elapsed - target;
            const dd = document.getElementById('delta-display');
            dd.textContent = (delta >= 0 ? '+' : '-') + fmt(Math.abs(delta));
            dd.className = 'delta-display ' + (Math.abs(delta) < 5 ? 'neutral' : delta > 0 ? 'behind' : 'ahead');
            document.getElementById('delta-target').textContent = `想定 ${fmt(target)}`;

            document.getElementById('btn-next').disabled = currentQ >= QUESTIONS.length - 1;
        }

        function nextQuestion() {
            if (currentQ >= QUESTIONS.length - 1) return;
            currentQ++;
            render();
        }

        function handlePause() {
            const btn = document.getElementById('btn-pause');
            if (!pauseConfirm) {
                pauseConfirm = true;
                btn.classList.add('confirm-mode');
                btn.textContent = '本当に？もう一度';
                pauseTimer = setTimeout(() => {
                    pauseConfirm = false;
                    btn.classList.remove('confirm-mode');
                    btn.textContent = paused ? '▶ 再開' : '⏸ 一時停止';
                }, 3000);
            } else {
                clearTimeout(pauseTimer);
                pauseConfirm = false;
                btn.classList.remove('confirm-mode');
                paused = !paused;
                btn.textContent = paused ? '▶ 再開' : '⏸ 一時停止';
            }
        }

        function handleReset() {
            const btn = document.getElementById('btn-reset');
            if (!resetConfirm) {
                resetConfirm = true;
                btn.classList.add('confirm-mode');
                btn.textContent = '本当に？もう一度';
                resetTimer = setTimeout(() => {
                    resetConfirm = false;
                    btn.classList.remove('confirm-mode');
                    btn.textContent = '↺ リセット';
                }, 3000);
            } else {
                clearTimeout(resetTimer);
                resetConfirm = false;
                btn.classList.remove('confirm-mode');
                btn.textContent = '↺ リセット';
                remaining = TOTAL_SEC; elapsed = 0; currentQ = 0;
                paused = false; finished = false;
                document.getElementById('overlay-clear').classList.remove('show');
                document.getElementById('btn-pause').textContent = '⏸ 一時停止';
                render();
            }
        }

        render();
    </script>
</body>

</html>
